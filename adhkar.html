<style>
/* ── Tabs ─────────────────────────────────── */
.az-tabs {
  display: flex;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px;
  margin-bottom: 22px;
  box-shadow: var(--shadow-sm);
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.az-tabs::-webkit-scrollbar { display: none; }
.az-tab {
  flex: 1;
  min-width: 80px;
  padding: 10px 10px;
  border-radius: 12px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s var(--ease);
  white-space: nowrap;
  text-align: center;
}
.az-tab:hover { background: var(--sand); color: var(--ink); }
.az-tab.active {
  background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
  color: #fff;
  box-shadow: 0 4px 12px rgba(14,59,46,.25);
}
html[data-theme="dark"] .az-tab.active,
html[data-theme="oled"] .az-tab.active {
  background: linear-gradient(135deg, var(--sys-green), #2eb84d);
  color: #001a08;
}
.az-tab .tab-ico { display: block; font-size: 18px; margin-bottom: 2px; }

/* ── Progress strip at top of tab ─────────── */
.az-section-prog {
  height: 5px; background: var(--sand-2);
  border-radius: 99px; overflow: hidden;
  margin-bottom: 18px;
}
.az-section-prog span {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--green-soft), var(--gold));
  border-radius: 99px;
  transition: width .6s var(--ease);
  will-change: width;
}

/* ── Adhkar Card ──────────────────────────── */
.az-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 18px 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  transition: border-color .2s, background .2s;
  position: relative;
}
.az-card:hover { border-color: var(--gold); }
.az-card.az-done {
  border-color: rgba(77,216,102,.4);
  background: rgba(77,216,102,.03);
}
html[data-theme="oled"] .az-card.az-done { background: rgba(77,216,102,.05); }

/* Delete button (custom cards) */
.az-delete {
  position: absolute; top: 10px; left: 10px;
  width: 26px; height: 26px; border-radius: 50%;
  border: none; background: rgba(255,59,48,.12);
  color: var(--sys-red); font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
}
.az-delete:hover { background: rgba(255,59,48,.25); transform: scale(1.1); }

.az-arabic {
  font-family: 'Amiri', serif;
  font-size: 19px; line-height: 1.9;
  color: var(--green-deep);
  margin-bottom: 10px;
}
html[data-theme="dark"] .az-arabic,
html[data-theme="oled"] .az-arabic { color: var(--sys-yellow); }

.az-meta {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 10px;
}
.az-label { font-size: 14px; font-weight: 700; color: var(--ink); }
.az-source { font-size: 11px; }
.az-count-row {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
}
.az-cnt-num {
  font-size: 16px; font-weight: 900;
  color: var(--green-deep); min-width: 72px;
  font-feature-settings: "tnum";
}
html[data-theme="dark"] .az-cnt-num,
html[data-theme="oled"] .az-cnt-num { color: var(--sys-green); }
.az-done .az-cnt-num { color: var(--sys-green); }
.az-btn-count {
  padding: 9px 20px; border-radius: 99px; border: none;
  background: var(--green-deep); color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.az-btn-count:hover { background: var(--green-mid); transform: translateY(-1px); }
.az-btn-count:active { transform: scale(.96); }
html[data-theme="dark"] .az-btn-count,
html[data-theme="oled"] .az-btn-count {
  background: var(--sys-green); color: #001a08;
}
.az-btn-reset {
  padding: 9px 14px; border-radius: 99px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted); font-family: inherit; font-size: 13px;
  cursor: pointer; transition: all .15s;
}
.az-btn-reset:hover { border-color: var(--sys-red); color: var(--sys-red); }

/* ── Add custom dhikr form ────────────────── */
.az-add-form {
  background: var(--card);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.az-add-form:focus-within {
  border-color: var(--gold);
  border-style: solid;
}
.az-add-form label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--muted); margin-bottom: 6px; text-align: right;
}
.az-add-form textarea {
  width: 100%; padding: 12px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--sand);
  font-family: 'Amiri', serif; font-size: 18px;
  color: var(--green-deep); line-height: 1.8;
  resize: vertical; min-height: 80px; direction: rtl;
  margin-bottom: 10px;
}
html[data-theme="dark"] .az-add-form textarea,
html[data-theme="oled"] .az-add-form textarea {
  background: var(--sand-2); color: var(--sys-yellow); border-color: var(--border);
}
.az-add-row {
  display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap;
}
.az-add-field {
  display: flex; flex-direction: column; gap: 4px;
}
.az-add-field input {
  padding: 9px 12px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--sand);
  font-family: inherit; font-size: 13px; color: var(--ink);
  direction: rtl;
}
html[data-theme="dark"] .az-add-field input,
html[data-theme="oled"] .az-add-field input {
  background: var(--sand-2); color: var(--ink);
}
.az-add-field input:focus {
  outline: none; border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,161,74,.15);
}

@media(max-width:600px) {
  .az-tab { font-size:11px; padding: 9px 8px; min-width:68px; }
  .az-arabic { font-size:17px; }
  .az-add-row { flex-direction:column; }
  .az-add-row .btn { width:100%; justify-content:center; }
}

<style>
/* ── Glow card animation ──── */
@keyframes cardIn {
  from { opacity:0; transform:translateY(18px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,161,74,0); }
  50%     { box-shadow: 0 0 18px 4px rgba(201,161,74,.18); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes floatNav {
  from { opacity:0; transform:translateX(-50%) translateY(16px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:all; }
}

.az-card-new {
  animation: cardIn .35s cubic-bezier(.22,.68,0,1.2) both;
}
.az-card.az-done {
  animation: glowPulse 2s ease-in-out;
  border-color: rgba(77,216,102,.45) !important;
}

/* Shimmer on done */
.az-card.az-done::before {
  content:'';
  position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(105deg,transparent 40%,rgba(201,161,74,.08) 50%,transparent 60%);
  background-size:200% 100%;
  animation:shimmer 1.5s ease forwards;
  pointer-events:none;
}

/* Tab indicator line */
.az-tab.active::after {
  content:'';
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:20px;height:2px;
  background:rgba(255,255,255,.5);border-radius:99px;
}
.az-tab { position:relative; }

/* ══ Accordion (ستايل الأقسام القديم) ══ */
.adhkar-menu-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;background:var(--card);border:1.5px solid var(--border);border-right-width:5px;margin-bottom:12px;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:var(--shadow-sm)}
.adhkar-menu-card:hover{box-shadow:var(--shadow)}
.adhkar-menu-card:active{transform:scale(.985)}
.amc-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.amc-body{flex:1}
.amc-title{font-size:17px;font-weight:800;color:var(--ink);font-family:'ThmanyahSans',sans-serif}
.amc-count{font-size:12.5px;color:var(--muted);margin-top:3px}
.amc-arrow{font-size:16px;color:var(--muted);flex-shrink:0}
.az-acc{margin-bottom:4px}
.az-acc.open .adhkar-menu-card{margin-bottom:10px}
.az-acc-body{animation:accDown .3s ease}
@keyframes accDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.afs-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow-sm);transition:border-color .2s,background .2s}
.afs-card.afs-done{background:rgba(77,216,102,.05);border-color:rgba(77,216,102,.45)}
.afs-label{font-size:13px;font-weight:800;color:var(--green-deep);margin-bottom:10px}
html[data-theme="dark"] .afs-label,html[data-theme="oled"] .afs-label{color:var(--sys-green)}
.afs-arabic{font-family:'Amiri',serif;font-size:20px;line-height:2.1;text-align:center;color:var(--green-deep);margin-bottom:12px}
html[data-theme="dark"] .afs-arabic,html[data-theme="oled"] .afs-arabic{color:var(--sys-yellow)}
.afs-virtue{font-size:12.5px;color:var(--gold-dark);background:rgba(201,161,74,.08);padding:9px 13px;border-radius:10px;margin-bottom:12px;line-height:1.7}
.afs-footer{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.afs-source{font-size:11.5px;color:var(--muted);flex:1;min-width:120px}
.afs-counter{display:flex;align-items:center;gap:8px}
.afs-count-num{font-size:13px;font-weight:800;min-width:62px;text-align:center;color:var(--ink);font-feature-settings:"tnum"}
.afs-count-btn{min-width:60px;padding:10px 18px;border-radius:12px;border:none;background:var(--green-deep);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.afs-count-btn:hover{background:var(--green-mid);transform:translateY(-1px)}
.afs-count-btn:active{transform:scale(.95)}
html[data-theme="dark"] .afs-count-btn,html[data-theme="oled"] .afs-count-btn{background:var(--sys-green);color:#001a08}
.afs-progress{height:6px;background:var(--sand-2);border-radius:3px;overflow:hidden;margin-top:12px}
.afs-progress span{display:block;height:100%;border-radius:3px;transition:width .35s}
@media(max-width:600px){.afs-arabic{font-size:18px}.afs-footer{gap:8px}.afs-source{min-width:100%}}

/* Floating nav — base */
/* شريط اختصارات الفئات (أعلى الصفحة) */
.az-top-chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 0 4px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.az-top-chips::-webkit-scrollbar{display:none}
.az-chip{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:999px;padding:8px 14px;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;white-space:nowrap;transition:all .18s;box-shadow:var(--shadow-sm)}
.az-chip:hover,.az-chip:active{border-color:var(--gold);transform:translateY(-1px)}
.az-chip .az-chip-i{font-size:15px}
#az-fab-nav::-webkit-scrollbar{display:none}
#az-fab-nav {
  position:fixed; bottom:150px; left:50%; transform:translateX(-50%) translateY(20px);
  max-width:min(90vw,520px); overflow-x:auto; scrollbar-width:none;
  background:var(--card); border:1px solid var(--border); border-radius:99px;
  padding:6px 10px; display:flex; gap:4px;
  box-shadow:0 8px 32px rgba(0,0,0,.15); z-index:200;
  transition:opacity .3s, transform .3s; opacity:0; pointer-events:none;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
#az-fab-nav button {
  width:34px; height:34px; border-radius:50%; border:none; background:none;
  cursor:pointer; font-size:16px; transition:background .2s;
  display:flex; align-items:center; justify-content:center;
}
#az-fab-nav button:hover { background:var(--sand); }

/* Floating nav visible state */
#az-fab-nav.visible {
  opacity:1 !important;
  transform:translateX(-50%) translateY(0) !important;
  pointer-events:all !important;
  animation: floatNav .35s cubic-bezier(.22,.68,0,1.2) forwards;
}

/* Section header inside cards tab */
.az-section-header {
  display:flex;align-items:center;gap:10px;
  margin:24px 0 14px;
  padding-bottom:10px;
  border-bottom:1.5px solid var(--border);
}
.az-section-header .sh-ico { font-size:22px; }
.az-section-header .sh-title {
  font-size:15px;font-weight:800;color:var(--ink);
  font-family:'ThmanyahSans',sans-serif;
}
.az-section-header .sh-count {
  margin-right:auto;font-size:11px;font-weight:700;
  background:var(--sand-2);color:var(--muted);
  border-radius:99px;padding:2px 10px;
}

/* Motion: stagger children */
.az-cards-group > .az-card {
  animation-delay: calc(var(--i) * 60ms);
}

/* Dark mode glow card */
html[data-theme="dark"] .az-card:hover,
html[data-theme="oled"] .az-card:hover {
  box-shadow: 0 4px 20px rgba(201,161,74,.1);
}

/* Count button pulse on tap */
@keyframes btnTap { 0%{transform:scale(1)} 40%{transform:scale(.92)} 100%{transform:scale(1)} }
.az-btn-count:active { animation: btnTap .2s ease; }
</style>

      <div class="ar">ألا بذكر الله تطمئن القلوب</div>
    </div>

    <!-- ══ Accordion: section cards ══ -->
    <div class="az-intro">
      <h2 class="section-title" style="font-size:20px;margin-bottom:4px"><span style="color:var(--gold)">📿</span> كل الأذكار</h2>
      <p style="color:var(--muted);font-size:13px;margin-bottom:6px"><span id="az-sec-count">14</span> قسماً موثّقاً — اضغط أي قسم لعرض أذكاره كاملة</p>
    </div>

    <!-- Quick filter -->
    <div style="margin-bottom:16px">
      <input type="text" id="az-search" placeholder="🔍 ابحث في كل الأذكار..." onkeyup="filterAccordion()"
        style="width:100%;padding:12px 18px;border-radius:99px;border:1px solid var(--border);
               background:var(--card);color:var(--ink);font-family:inherit;font-size:14px;
               outline:none;box-shadow:var(--shadow-sm)">
    </div>

    <div class="az-top-chips" id="az-top-chips"></div>
    <div id="az-accordion"></div>

    <!-- ══ Floating Quick-Nav ══ -->
    <div id="az-fab-nav"></div>

<script>
/* ════════════════════════════════════════════════════════════
   صفحة الأذكار — أكورديون (ستايل قديم) + محتوى كامل بدون تشكيل
   البيانات: window.AZ_SECTIONS  (js/adhkar-azkar.js)
   ════════════════════════════════════════════════════════════ */
function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function getCount(sec, id){ return (window.STATE?.adhkar?.[sec]?.[id]) || 0; }
function setCount(sec, id, val){
  if(!STATE.adhkar) STATE.adhkar = {};
  if(!STATE.adhkar[sec]) STATE.adhkar[sec] = {};
  STATE.adhkar[sec][id] = val;
  if(typeof saveState === 'function') saveState();
}

/* بناء كارت ذكر واحد داخل قسم */
function cardHTML(d, sec){
  const cur = getCount(sec, d.id), tgt = d.n || 1;
  const lap = cur % tgt, laps = Math.floor(cur/tgt);
  const pct = Math.min(Math.round(((lap||(cur>0?tgt:0))/tgt)*100),100);
  const done = cur >= tgt;
  const virtue = d.virtue ? `<div class="afs-virtue">⭐ ${esc(d.virtue)}</div>` : '';
  return `<div class="afs-card${done?' afs-done':''}" id="az-card-${d.id}">
    <div class="afs-label">${esc(d.label)}</div>
    <div class="afs-arabic">${esc(d.ar)}</div>
    ${virtue}
    <div class="afs-footer">
      <span class="afs-source">📖 ${esc(d.src)}</span>
      <div class="afs-counter">
        <button onclick="shareAz('${sec}','${d.id}')" style="background:none;border:none;font-size:16px;cursor:pointer;opacity:.55" title="مشاركة">📤</button>
        <button class="afs-reset" onclick="resetOne('${sec}','${d.id}')" title="إعادة" style="width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer">↺</button>
        <span class="afs-count-num" id="az-cnt-${d.id}">${cur} / ${tgt}${laps>0?' (×'+laps+')':''}</span>
        <button class="afs-count-btn" id="az-btn-${d.id}" onclick="tap('${sec}','${d.id}',${tgt})">${done?'✅':'+ عدّ'}</button>
      </div>
    </div>
    <div class="afs-progress"><span id="az-prog-${d.id}" style="width:${pct}%;background:${done?'var(--sys-green,#4dd866)':'linear-gradient(90deg,var(--green-soft,#2a9d6f),var(--gold,#c9a14a))'}"></span></div>
  </div>`;
}

/* بناء الأكورديون كامل */
function renderAccordion(){
  const wrap = document.getElementById('az-accordion');
  if(!wrap || !window.AZ_SECTIONS) return;
  const open = (STATE?.adhkar?._openSec) || null;
  wrap.innerHTML = window.AZ_SECTIONS.map(sec => {
    const n = sec.items.length;
    const isOpen = open === sec.key;
    const body = isOpen ? sec.items.map(d => cardHTML(d, sec.key)).join('') : '';
    return `<div class="az-acc${isOpen?' open':''}" data-sec="${sec.key}" id="acc-${sec.key}">
      <div class="adhkar-menu-card" style="border-color:${sec.color};border-right-color:${sec.color}" onclick="toggleSec('${sec.key}')">
        <div class="amc-icon" style="background:${sec.color}22">${sec.icon}</div>
        <div class="amc-body">
          <div class="amc-title">${esc(sec.title)}</div>
          <div class="amc-count">${n} أذكار · ${esc(sec.sub)}</div>
        </div>
        <span class="amc-arrow" id="arr-${sec.key}">${isOpen?'▲':'▾'}</span>
      </div>
      <div class="az-acc-body" id="body-${sec.key}" data-rendered="${isOpen?'1':'0'}" style="${isOpen?'':'display:none'}">${body}</div>
    </div>`;
  }).join('');
}

window.toggleSec = function(key){
  const body = document.getElementById('body-'+key);
  const arr  = document.getElementById('arr-'+key);
  const acc  = document.getElementById('acc-'+key);
  if(!body) return;
  const willOpen = body.style.display === 'none' || !body.style.display;
  if(willOpen && body.dataset.rendered!=='1' && window.AZ_SECTIONS){
    const sec=window.AZ_SECTIONS.find(s=>s.key===key);
    if(sec){ body.innerHTML=sec.items.map(d=>cardHTML(d,key)).join(''); body.dataset.rendered='1'; }
  }
  /* أغلق الباقي (أكورديون كلاسيكي) */
  document.querySelectorAll('.az-acc-body').forEach(b=>{ if(b!==body) b.style.display='none'; });
  document.querySelectorAll('.amc-arrow').forEach(a=>a.textContent='▾');
  document.querySelectorAll('.az-acc').forEach(a=>a.classList.remove('open'));
  body.style.display = willOpen ? 'block' : 'none';
  if(arr) arr.textContent = willOpen ? '▲' : '▾';
  if(willOpen){ acc?.classList.add('open'); acc?.scrollIntoView({behavior:'smooth',block:'start'}); }
  if(!STATE.adhkar) STATE.adhkar = {};
  STATE.adhkar._openSec = willOpen ? key : null;
  if(typeof saveState==='function') saveState();
};

window.tap = function(sec, id, tgt){
  const next = getCount(sec, id) + 1;
  setCount(sec, id, next);
  if(navigator.vibrate) navigator.vibrate(12);
  const cntEl=document.getElementById('az-cnt-'+id), progEl=document.getElementById('az-prog-'+id),
        cardEl=document.getElementById('az-card-'+id), btnEl=document.getElementById('az-btn-'+id);
  const lap=next%tgt, laps=Math.floor(next/tgt);
  const pct=Math.min(Math.round(((lap||(next>0?tgt:0))/tgt)*100),100);
  if(cntEl) cntEl.textContent = `${next} / ${tgt}${laps>0?' (×'+laps+')':''}`;
  if(progEl) progEl.style.width = pct+'%';
  if(next===tgt || (next>0 && next%tgt===0)){
    cardEl?.classList.add('afs-done');
    if(progEl) progEl.style.background='var(--sys-green,#4dd866)';
    if(btnEl) btnEl.textContent='✅';
    if(navigator.vibrate) navigator.vibrate([40,20,40]);
    if(typeof showToast==='function') showToast('✅ مكتمل — بارك الله فيك');
    if(typeof confetti!=='undefined') confetti({particleCount:40,spread:50,origin:{y:.7},colors:['#0e3b2e','#c9a14a','#fff']});
  } else {
    cardEl?.classList.remove('afs-done');
    if(btnEl) btnEl.textContent='+ عدّ';
  }
};

window.resetOne = function(sec, id){
  setCount(sec, id, 0);
  const c=document.getElementById('az-cnt-'+id), p=document.getElementById('az-prog-'+id),
        ca=document.getElementById('az-card-'+id), b=document.getElementById('az-btn-'+id);
  const tgt = (()=>{ for(const s of window.AZ_SECTIONS){ const it=s.items.find(x=>x.id===id); if(it) return it.n||1; } return 1; })();
  if(c) c.textContent = `0 / ${tgt}`;
  if(p){ p.style.width='0%'; p.style.background='linear-gradient(90deg,var(--green-soft,#2a9d6f),var(--gold,#c9a14a))'; }
  ca?.classList.remove('afs-done'); if(b) b.textContent='+ عدّ';
};

window.shareAz = function(sec, id){
  let d=null; for(const s of window.AZ_SECTIONS){ const it=s.items.find(x=>x.id===id); if(it){d=it;break;} }
  if(!d) return;
  const txt = `🤲 ${d.label}\n\n${d.ar}\n\n📖 ${d.src}\n\nمن تطبيق زاد`;
  if(navigator.share) navigator.share({title:'ذكر', text:txt});
  else { navigator.clipboard?.writeText(txt); if(typeof showToast==='function') showToast('📋 تم النسخ'); }
};

/* بحث: يفتح الأقسام اللي فيها نتيجة ويخفي غير المطابق */
window.filterAccordion = function(){
  const q = (document.getElementById('az-search')?.value||'').trim().toLowerCase();
  if(!q){ renderAccordion(); return; }
  renderAllBodies();
  document.querySelectorAll('.az-acc').forEach(acc=>{
    const cards = acc.querySelectorAll('.afs-card');
    let any=false;
    cards.forEach(c=>{ const m=c.innerText.toLowerCase().includes(q); c.style.display=m?'':'none'; if(m)any=true; });
    const body=acc.querySelector('.az-acc-body'), arr=acc.querySelector('.amc-arrow');
    acc.style.display = any?'':'none';
    if(any){ body.style.display='block'; if(arr)arr.textContent='▲'; }
  });
};

/* بناء كل أجسام الأقسام (للبحث) */
function renderAllBodies(){
  if(!window.AZ_SECTIONS) return;
  document.querySelectorAll('.az-acc-body').forEach(body=>{
    if(body.dataset.rendered==='1') return;
    const key=body.id.replace('body-','');
    const sec=window.AZ_SECTIONS.find(s=>s.key===key);
    if(sec){ body.innerHTML=sec.items.map(d=>cardHTML(d,key)).join(''); body.dataset.rendered='1'; }
  });
}

/* شريط اختصارات الفئات في الأعلى (زي صفحة الأدعية) */
function buildTopChips(){
  const el=document.getElementById('az-top-chips');
  if(!el||!window.AZ_SECTIONS) return;
  el.innerHTML=window.AZ_SECTIONS.map(s=>
    `<button class="az-chip" onclick="jumpSec('${s.key}')" title="${esc(s.title)}"><span class="az-chip-i">${s.icon}</span><span>${esc(s.title)}</span></button>`).join('');
}

/* بار التنقل العائم: يبني نفسه من الأقسام */
function buildFab(){
  const fab=document.getElementById('az-fab-nav');
  if(!fab||!window.AZ_SECTIONS) return;
  fab.innerHTML = window.AZ_SECTIONS.slice(0,8).map(s=>
    `<button onclick="jumpSec('${s.key}')" title="${esc(s.title)}">${s.icon}</button>`).join('');
}
window.jumpSec = function(key){
  const body=document.getElementById('body-'+key);
  if(body && (body.style.display==='none'||!body.style.display)) toggleSec(key);
  document.getElementById('acc-'+key)?.scrollIntoView({behavior:'smooth',block:'start'});
};
(function(){
  let ticking=false;
  window.addEventListener('scroll',()=>{
    if(!ticking){ requestAnimationFrame(()=>{
      const acc=document.getElementById('az-accordion'), fab=document.getElementById('az-fab-nav');
      if(acc&&fab){ fab.classList.toggle('visible', acc.getBoundingClientRect().top < -40); }
      ticking=false;
    }); ticking=true; }
  },{passive:true});
})();

document.addEventListener('DOMContentLoaded', () => {
  function boot(){
    if(!window.AZ_SECTIONS || typeof STATE==='undefined'){ setTimeout(boot,80); return; }
    const c=document.getElementById('az-sec-count'); if(c) c.textContent=window.AZ_SECTIONS.length;
    renderAccordion();
    buildTopChips();
    buildFab();
    /* افتح أول قسم افتراضياً لو مفيش محفوظ */
    if(!STATE?.adhkar?._openSec) toggleSec(window.AZ_SECTIONS[0].key);
  }
  boot();
});
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e3b2e">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
<title>المصحف الشريف — زاد العشر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap">
<link rel="stylesheet" href="css/style.css">
<style>
@font-face{font-family:'ThmanyahSans';src:url('fonts/thmanyahsans-Bold.otf') format('opentype');font-weight:700;font-display:swap}
html,body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;overflow-x:hidden}

/* ══ Layout ═════════════════════════════════════════════════ */
.mushaf-app{display:flex;flex-direction:column;min-height:100dvh;background:var(--sand)}

/* ══ Top Bar ════════════════════════════════════════════════ */
.mushaf-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--green-deep);color:#fff;
  gap:10px;flex-shrink:0;position:sticky;top:0;z-index:60
}
.mt-brand{display:flex;align-items:center;gap:8px;min-width:0}
.mt-brand img{width:26px;height:26px;border-radius:5px;flex-shrink:0}
.mt-title{font-size:14px;font-weight:700;font-family:'ThmanyahSans',sans-serif;color:#fff;white-space:nowrap}
.mt-sub{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.mt-actions{display:flex;gap:6px;flex-shrink:0}
.mt-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:6px 10px;color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .2s
}
.mt-btn:hover{background:rgba(255,255,255,.25)}

/* ══ Nav Bar ════════════════════════════════════════════════ */
.mushaf-nav{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;gap:7px;align-items:center;
  flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;position:sticky;top:48px;z-index:55
}
.mushaf-nav::-webkit-scrollbar{display:none}
.mn-select{
  flex-shrink:0;padding:6px 10px;border-radius:9px;
  border:1.5px solid var(--border);background:var(--sand);
  color:var(--ink);font-family:inherit;font-size:12px;
  outline:none;cursor:pointer;max-width:160px
}
.mn-select:focus{border-color:var(--gold)}
.mn-input{
  width:56px;flex-shrink:0;padding:6px 8px;border-radius:9px;
  border:1.5px solid var(--border);background:var(--sand);
  color:var(--ink);font-family:'ThmanyahSans',monospace;
  font-size:13px;font-weight:700;text-align:center;outline:none;direction:ltr
}
.mn-input:focus{border-color:var(--gold)}
.mn-of{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.mn-bm{
  width:33px;height:33px;flex-shrink:0;border-radius:9px;
  border:1.5px solid var(--border);background:var(--sand);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:all .2s
}
.mn-bm:hover,.mn-bm.marked{border-color:var(--gold);background:var(--gold-pale)}

/* ══ Quran Text Page ════════════════════════════════════════ */
.mushaf-page{
  flex:1;background:var(--sand);
  padding:16px 14px 20px;position:relative;min-height:70vh
}

/* Page header (surah name + juz) */
.page-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:2px solid rgba(201,161,74,.3);
  margin-bottom:14px;font-size:11px;font-weight:700;
  color:var(--gold-dark)
}
html[data-theme="dark"] .page-header,html[data-theme="oled"] .page-header{color:var(--sys-yellow)}

/* Surah title */
.surah-title{
  text-align:center;margin:16px 0 10px;
  font-family:'Amiri Quran','Amiri',serif;
  font-size:22px;color:var(--green-deep);
  background:linear-gradient(135deg,var(--gold-pale),var(--sand));
  border:1px solid rgba(201,161,74,.25);border-radius:10px;padding:10px 16px
}
html[data-theme="dark"] .surah-title,html[data-theme="oled"] .surah-title{
  color:var(--sys-yellow);background:rgba(201,161,74,.06);
}

/* Basmala */
.basmala{
  text-align:center;font-family:'Amiri Quran','Amiri',serif;
  font-size:28px;color:var(--green-deep);margin:8px 0 16px;
  line-height:2
}
html[data-theme="dark"] .basmala,html[data-theme="oled"] .basmala{color:var(--sys-yellow)}

/* Quran text block — justified like a real Mushaf */
.quran-text{
  font-family:'Amiri Quran','Amiri',serif;
  font-size:var(--mushaf-font-size, 24px);
  line-height:2.4;color:var(--ink);
  text-align:justify;direction:rtl;
  padding:4px 0
}
.quran-text .aya-num{
  display:inline-block;
  font-family:'ThmanyahSans','Tajawal',sans-serif;
  font-size:12px;color:var(--gold-dark);
  border:1px solid rgba(201,161,74,.4);border-radius:50%;
  width:24px;height:24px;line-height:22px;text-align:center;
  margin:0 4px;vertical-align:middle;flex-shrink:0
}
html[data-theme="dark"] .quran-text,html[data-theme="oled"] .quran-text{color:var(--sys-yellow)}

/* Page footer */
.page-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-top:1px solid rgba(201,161,74,.2);
  margin-top:14px;font-size:11px;color:var(--muted)
}

/* Loading state */
.mushaf-loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--sand);z-index:10
}
.mushaf-loading.hidden{display:none}
.ml-spinner{font-size:40px;animation:spin 1.2s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ml-txt{font-size:13px;color:var(--muted)}

/* Error state */
.mushaf-error{display:none;text-align:center;padding:40px 20px}
.mushaf-error.show{display:block}

/* ══ Bottom Controls ════════════════════════════════════════ */
.mushaf-controls{
  background:var(--card);border-top:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;
  flex-shrink:0;position:sticky;bottom:0;z-index:55
}
.mc-btn{
  flex:1;padding:11px 16px;border-radius:12px;border:none;
  background:var(--green-deep);color:#fff;
  font-family:'ThmanyahSans',inherit;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;text-align:center
}
.mc-btn:hover{background:var(--green-mid);transform:translateY(-1px)}
.mc-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
html[data-theme="dark"] .mc-btn,html[data-theme="oled"] .mc-btn{background:var(--sys-green);color:#001a08}
.mc-info{text-align:center;min-width:72px}
.mc-num{font-size:22px;font-weight:900;font-family:'ThmanyahSans',monospace;color:var(--green-deep)}
html[data-theme="dark"] .mc-num,html[data-theme="oled"] .mc-num{color:var(--sys-green)}
.mc-lbl{font-size:10px;color:var(--muted)}
.mc-juz{font-size:11px;color:var(--gold-dark);font-weight:700;margin-top:2px}

/* ══ Font size control ══════════════════════════════════════ */
.font-ctrl{display:flex;gap:4px;align-items:center}
.fc-btn{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--border);background:var(--card);
  font-weight:700;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .2s
}
.fc-btn:hover{border-color:var(--gold);color:var(--gold-dark)}

/* ══ Bookmarks panel ════════════════════════════════════════ */
.bm-panel{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.bm-panel.open{display:flex}
.bm-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:22px 18px 36px;max-height:70vh;overflow-y:auto}
.bm-sheet h3{font-size:16px;font-weight:800;font-family:'ThmanyahSans',sans-serif;margin-bottom:12px}
.bm-item{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--sand);border:1px solid var(--border);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.bm-item:hover{border-color:var(--gold);background:var(--gold-pale)}
.bm-item b{display:block;font-size:14px;color:var(--green-deep)}
html[data-theme="dark"] .bm-item b,html[data-theme="oled"] .bm-item b{color:var(--sys-green)}
.bm-item small{font-size:11px;color:var(--muted)}
.bm-del{background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);padding:4px}
.bm-empty{text-align:center;color:var(--muted);padding:20px;font-size:13px}

/* ══ Cache indicator ════════════════════════════════════════ */
.cache-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--sys-green);display:inline-block;
  margin-right:4px;vertical-align:middle
}
</style>
<script>(function(){var s=localStorage.getItem('zad_v2');var t='light';try{var p=JSON.parse(s);t=p.theme||'light';}catch(e){}document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>
<div class="mushaf-app">

  <!-- Top Bar -->
  <div class="mushaf-topbar">
    <div class="mt-brand">
      <img src="icons/icon-192.svg" alt="زاد العشر">
      <div>
        <div class="mt-title">المصحف الشريف</div>
        <div class="mt-sub" id="mt-surah">مصحف المدينة النبوية</div>
      </div>
    </div>
    <div class="mt-actions">
      <div class="font-ctrl">
        <button class="fc-btn" onclick="changeFontSize(-2)" title="تصغير الخط">A−</button>
        <button class="fc-btn" onclick="changeFontSize(+2)" title="تكبير الخط">A+</button>
      </div>
      <button class="mt-btn" onclick="toggleThemeMushaf()">🌙</button>
      <a href="mushaf.html" class="mt-btn">← رجوع</a>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="mushaf-nav">
    <select class="mn-select" id="surah-sel" onchange="goToSurah(this.value)">
      <option value="">📖 سورة...</option>
    </select>
    <select class="mn-select" id="juz-sel" onchange="goToJuz(this.value)" style="max-width:90px">
      <option value="">الجزء</option>
    </select>
    <input class="mn-input" id="page-inp" type="number" min="1" max="604"
      placeholder="ص" inputmode="numeric" onchange="jumpPage(this.value)">
    <span class="mn-of">/ 604</span>
    <button class="mn-bm" id="bm-btn" onclick="toggleBm()" title="إشارة">🔖</button>
    <button class="mn-bm" onclick="openBmPanel()" title="إشاراتي">📚</button>
  </div>

  <!-- Quran Page -->
  <div class="mushaf-page" id="mushaf-page">
    <div class="mushaf-loading" id="q-load">
      <div class="ml-spinner">📖</div>
      <div class="ml-txt">جارٍ تحميل الصفحة...</div>
    </div>
    <div class="mushaf-error" id="q-err">
      <div style="font-size:40px;margin-bottom:12px">📡</div>
      <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px">تعذّر تحميل الصفحة</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px">تحقق من اتصالك بالإنترنت</div>
      <button onclick="loadPage(_page)" style="padding:10px 24px;border-radius:99px;border:none;background:var(--green-deep);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">🔄 إعادة المحاولة</button>
    </div>
    <div id="q-content" style="display:none"></div>
  </div>

  <!-- Bottom Controls -->
  <div class="mushaf-controls">
    <button class="mc-btn" id="btn-next" onclick="nextPage()">← التالية</button>
    <div class="mc-info">
      <div class="mc-num" id="mc-num">1</div>
      <div class="mc-lbl">صفحة</div>
      <div class="mc-juz" id="mc-juz">الجزء 1</div>
    </div>
    <button class="mc-btn" id="btn-prev" onclick="prevPage()">السابقة →</button>
  </div>

</div><!-- /mushaf-app -->

<!-- Bookmarks Panel -->
<div class="bm-panel" id="bm-panel" onclick="if(event.target===this)closeBmPanel()">
  <div class="bm-sheet">
    <h3>📚 الإشارات المرجعية</h3>
    <div id="bm-list"></div>
    <button onclick="closeBmPanel()" style="width:100%;padding:11px;border:1.5px solid var(--border);border-radius:11px;background:none;font-family:inherit;font-size:13px;cursor:pointer;color:var(--muted);margin-top:8px">إغلاق</button>
  </div>
</div>

<script src="lang.js" defer></script>
<script src="js/app.js" defer></script>
<script>
/* ════════════════════════════════════════════════════════════
   MUSHAF TEXT READER — alquran.cloud API + Amiri Quran font
   No images, no CORS issues, works reliably anywhere
   ════════════════════════════════════════════════════════════ */

/* ── Config ─────────────────────────────────────────────── */
const API      = 'https://api.alquran.cloud/v1/page';
const EDITION  = 'quran-uthmani'; /* Uthmani script */
const PAGE_KEY = 'zad_mushaf_page';
const BM_KEY   = 'zad_mushaf_bm';
const CACHE_KEY= 'zad_mpage_cache';
const MAX_CACHE= 30; /* pages to cache */

/* ── State ───────────────────────────────────────────────── */
let _page      = parseInt(localStorage.getItem(PAGE_KEY) || '1');
let _bookmarks = JSON.parse(localStorage.getItem(BM_KEY) || '[]');
let _pageCache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
let _fontSize  = parseInt(localStorage.getItem('zad_mfont') || '24');
let _loading   = false;

/* ── Surah start pages ───────────────────────────────────── */
const SURAHS = [
  {id:1,n:'الفاتحة',p:1},{id:2,n:'البقرة',p:2},{id:3,n:'آل عمران',p:50},
  {id:4,n:'النساء',p:77},{id:5,n:'المائدة',p:106},{id:6,n:'الأنعام',p:128},
  {id:7,n:'الأعراف',p:151},{id:8,n:'الأنفال',p:177},{id:9,n:'التوبة',p:187},
  {id:10,n:'يونس',p:208},{id:11,n:'هود',p:221},{id:12,n:'يوسف',p:235},
  {id:13,n:'الرعد',p:249},{id:14,n:'إبراهيم',p:255},{id:15,n:'الحجر',p:262},
  {id:16,n:'النحل',p:267},{id:17,n:'الإسراء',p:282},{id:18,n:'الكهف',p:293},
  {id:19,n:'مريم',p:305},{id:20,n:'طه',p:312},{id:21,n:'الأنبياء',p:322},
  {id:22,n:'الحج',p:332},{id:23,n:'المؤمنون',p:342},{id:24,n:'النور',p:350},
  {id:25,n:'الفرقان',p:359},{id:26,n:'الشعراء',p:367},{id:27,n:'النمل',p:377},
  {id:28,n:'القصص',p:385},{id:29,n:'العنكبوت',p:396},{id:30,n:'الروم',p:404},
  {id:31,n:'لقمان',p:411},{id:32,n:'السجدة',p:415},{id:33,n:'الأحزاب',p:418},
  {id:34,n:'سبأ',p:428},{id:35,n:'فاطر',p:434},{id:36,n:'يس',p:440},
  {id:37,n:'الصافات',p:446},{id:38,n:'ص',p:453},{id:39,n:'الزمر',p:458},
  {id:40,n:'غافر',p:467},{id:41,n:'فصلت',p:477},{id:42,n:'الشورى',p:483},
  {id:43,n:'الزخرف',p:489},{id:44,n:'الدخان',p:496},{id:45,n:'الجاثية',p:499},
  {id:46,n:'الأحقاف',p:502},{id:47,n:'محمد',p:507},{id:48,n:'الفتح',p:511},
  {id:49,n:'الحجرات',p:515},{id:50,n:'ق',p:518},{id:51,n:'الذاريات',p:520},
  {id:52,n:'الطور',p:523},{id:53,n:'النجم',p:526},{id:54,n:'القمر',p:528},
  {id:55,n:'الرحمن',p:531},{id:56,n:'الواقعة',p:534},{id:57,n:'الحديد',p:537},
  {id:58,n:'المجادلة',p:542},{id:59,n:'الحشر',p:545},{id:60,n:'الممتحنة',p:549},
  {id:61,n:'الصف',p:551},{id:62,n:'الجمعة',p:553},{id:63,n:'المنافقون',p:554},
  {id:64,n:'التغابن',p:556},{id:65,n:'الطلاق',p:558},{id:66,n:'التحريم',p:560},
  {id:67,n:'الملك',p:562},{id:68,n:'القلم',p:564},{id:69,n:'الحاقة',p:566},
  {id:70,n:'المعارج',p:568},{id:71,n:'نوح',p:570},{id:72,n:'الجن',p:571},
  {id:73,n:'المزمل',p:573},{id:74,n:'المدثر',p:575},{id:75,n:'القيامة',p:577},
  {id:76,n:'الإنسان',p:578},{id:77,n:'المرسلات',p:580},{id:78,n:'النبأ',p:582},
  {id:79,n:'النازعات',p:583},{id:80,n:'عبس',p:585},{id:81,n:'التكوير',p:586},
  {id:82,n:'الانفطار',p:587},{id:83,n:'المطففين',p:588},{id:84,n:'الانشقاق',p:589},
  {id:85,n:'البروج',p:590},{id:86,n:'الطارق',p:591},{id:87,n:'الأعلى',p:591},
  {id:88,n:'الغاشية',p:592},{id:89,n:'الفجر',p:593},{id:90,n:'البلد',p:594},
  {id:91,n:'الشمس',p:595},{id:92,n:'الليل',p:595},{id:93,n:'الضحى',p:596},
  {id:94,n:'الشرح',p:596},{id:95,n:'التين',p:597},{id:96,n:'العلق',p:597},
  {id:97,n:'القدر',p:598},{id:98,n:'البينة',p:598},{id:99,n:'الزلزلة',p:599},
  {id:100,n:'العاديات',p:599},{id:101,n:'القارعة',p:600},{id:102,n:'التكاثر',p:600},
  {id:103,n:'العصر',p:601},{id:104,n:'الهمزة',p:601},{id:105,n:'الفيل',p:601},
  {id:106,n:'قريش',p:602},{id:107,n:'الماعون',p:602},{id:108,n:'الكوثر',p:602},
  {id:109,n:'الكافرون',p:603},{id:110,n:'النصر',p:603},{id:111,n:'المسد',p:603},
  {id:112,n:'الإخلاص',p:604},{id:113,n:'الفلق',p:604},{id:114,n:'الناس',p:604}
];

const JUZ_PAGES = [1,22,42,62,82,102,121,142,162,182,201,222,241,262,282,302,322,342,362,382,402,422,442,462,482,502,522,542,562,582];

/* ── Helpers ─────────────────────────────────────────────── */
function getJuz(p){ for(let i=JUZ_PAGES.length-1;i>=0;i--) if(p>=JUZ_PAGES[i]) return i+1; return 1; }
function getSurahName(p){ const m=[...SURAHS].reverse().find(s=>s.p<=p); return m?`سورة ${m.n}`:'القرآن الكريم'; }
function toArabicNum(n){ return String(n).replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]); }

/* ── Cache management ────────────────────────────────────── */
function getCached(p){ return _pageCache[p] || null; }
function setCache(p, data){
  _pageCache[p] = data;
  const keys = Object.keys(_pageCache);
  if(keys.length > MAX_CACHE){
    const oldest = keys.sort((a,b)=>a-b)[0];
    delete _pageCache[oldest];
  }
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify(_pageCache)); }catch(e){}
}

/* ── Main render function ────────────────────────────────── */
async function loadPage(p, save=true) {
  if(_loading) return;
  p = Math.max(1, Math.min(604, p));
  _page = p;
  _loading = true;

  /* Show loading */
  const loadEl = document.getElementById('q-load');
  const errEl  = document.getElementById('q-err');
  const contEl = document.getElementById('q-content');
  if(loadEl) { loadEl.classList.remove('hidden'); loadEl.style.display='flex'; }
  if(errEl)  errEl.classList.remove('show');
  if(contEl) contEl.style.display = 'none';

  updateControls(p);
  if(save) localStorage.setItem(PAGE_KEY, p);

  try {
    /* Check cache first */
    let ayahs = getCached(p);

    if(!ayahs) {
      const res = await fetch(`${API}/${p}/${EDITION}`, { signal: AbortSignal.timeout(8000) });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      ayahs = data.data?.ayahs;
      if(ayahs) setCache(p, ayahs);
    }

    if(!ayahs || !ayahs.length) throw new Error('no data');
    renderAyahs(p, ayahs);

  } catch(e) {
    console.warn('Quran API error:', e.message);
    if(loadEl) loadEl.style.display = 'none';
    if(errEl)  errEl.classList.add('show');
  } finally {
    _loading = false;
  }
}

/* ── Render ayahs ────────────────────────────────────────── */
function renderAyahs(p, ayahs) {
  const loadEl = document.getElementById('q-load');
  const contEl = document.getElementById('q-content');
  if(loadEl) loadEl.style.display = 'none';
  if(!contEl) return;

  const juz = getJuz(p);
  const cached = getCached(p) !== null;

  /* Group ayahs by surah */
  const groups = [];
  let cur = null;
  ayahs.forEach(a => {
    if(!cur || cur.surah !== a.surah.number) {
      cur = { surah: a.surah.number, name: a.surah.name, ayahs: [], bismillah: a.surah.number !== 1 && a.surah.number !== 9 && a.numberInSurah === 1 };
      groups.push(cur);
    }
    cur.ayahs.push(a);
  });

  let html = `
    <div class="page-header">
      <span>${getSurahName(p)}</span>
      <span>${cached ? '<span class="cache-dot"></span>' : ''}الجزء ${toArabicNum(juz)}</span>
    </div>`;

  groups.forEach(g => {
    /* Show surah title if starting surah */
    if(g.ayahs[0]?.numberInSurah === 1) {
      html += `<div class="surah-title">سُورَةُ ${g.name}</div>`;
      if(g.bismillah) {
        html += `<div class="basmala">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>`;
      }
    }
    /* Ayahs text */
    html += `<div class="quran-text" style="font-size:${_fontSize}px">`;
    g.ayahs.forEach(a => {
      html += `${a.text} <span class="aya-num">${toArabicNum(a.numberInSurah)}</span> `;
    });
    html += `</div>`;
  });

  html += `<div class="page-footer"><span>صفحة ${toArabicNum(p)}</span><span>الجزء ${toArabicNum(juz)}</span></div>`;

  contEl.innerHTML = html;
  contEl.style.display = 'block';

  /* Scroll to top of page */
  const pg = document.getElementById('mushaf-page');
  if(pg) pg.scrollTop = 0;

  /* Preload adjacent pages silently */
  if(p < 604 && !getCached(p+1)) setTimeout(()=>preloadPage(p+1), 800);
  if(p > 1   && !getCached(p-1)) setTimeout(()=>preloadPage(p-1), 1200);
}

async function preloadPage(p) {
  try {
    const res = await fetch(`${API}/${p}/${EDITION}`, { signal: AbortSignal.timeout(6000) });
    if(!res.ok) return;
    const data = await res.json();
    if(data.data?.ayahs) setCache(p, data.data.ayahs);
  } catch(e) {}
}

/* ── Controls update ─────────────────────────────────────── */
function updateControls(p) {
  const juz = getJuz(p);
  const name = getSurahName(p);

  document.getElementById('mc-num').textContent = p;
  document.getElementById('mc-juz').textContent = 'الجزء ' + juz;
  document.getElementById('mt-surah').textContent = name;

  const inp = document.getElementById('page-inp');
  if(inp) inp.value = p;

  /* Surah select */
  const ss = document.getElementById('surah-sel');
  if(ss) { const m=[...SURAHS].reverse().find(s=>s.p<=p); if(m) ss.value=m.p; }

  /* Juz select */
  const js = document.getElementById('juz-sel');
  if(js) js.value = juz;

  /* Buttons */
  document.getElementById('btn-prev').disabled = p <= 1;
  document.getElementById('btn-next').disabled = p >= 604;

  updateBmBtn();
}

/* ── Navigation ─────────────────────────────────────────── */
function nextPage(){ if(_page < 604) loadPage(_page+1); }
function prevPage(){ if(_page > 1)   loadPage(_page-1); }
function jumpPage(v){ const n=parseInt(v); if(n>=1&&n<=604) loadPage(n); }
function goToSurah(v){ if(v) loadPage(parseInt(v)); }
function goToJuz(v){ if(!v) return; const i=parseInt(v)-1; if(JUZ_PAGES[i]) loadPage(JUZ_PAGES[i]); }

/* ── Font size ───────────────────────────────────────────── */
function changeFontSize(delta) {
  _fontSize = Math.max(18, Math.min(36, _fontSize + delta));
  localStorage.setItem('zad_mfont', _fontSize);
  document.querySelectorAll('.quran-text').forEach(el => el.style.fontSize = _fontSize + 'px');
}

/* ── Bookmarks ───────────────────────────────────────────── */
function toggleBm() {
  const idx = _bookmarks.findIndex(b => b.p === _page);
  if(idx > -1) _bookmarks.splice(idx, 1);
  else _bookmarks.push({ p:_page, s:getSurahName(_page), j:getJuz(_page), d:new Date().toLocaleDateString('ar-EG') });
  localStorage.setItem(BM_KEY, JSON.stringify(_bookmarks));
  updateBmBtn();
}
function updateBmBtn() {
  const btn = document.getElementById('bm-btn');
  if(btn) btn.classList.toggle('marked', _bookmarks.some(b=>b.p===_page));
}
function openBmPanel() {
  document.getElementById('bm-panel').classList.add('open');
  const list = document.getElementById('bm-list');
  if(!_bookmarks.length) { list.innerHTML='<div class="bm-empty">لا توجد إشارات — اضغط 🔖 لحفظ صفحتك</div>'; return; }
  list.innerHTML = _bookmarks.slice().reverse().map(b=>`
    <div class="bm-item" onclick="loadPage(${b.p});closeBmPanel()">
      <div><b>صفحة ${b.p}</b><small>${b.s} · الجزء ${b.j} · ${b.d}</small></div>
      <button class="bm-del" onclick="event.stopPropagation();delBm(${b.p})">🗑️</button>
    </div>`).join('');
}
function closeBmPanel(){ document.getElementById('bm-panel').classList.remove('open'); }
function delBm(p){ _bookmarks=_bookmarks.filter(b=>b.p!==p); localStorage.setItem(BM_KEY,JSON.stringify(_bookmarks)); openBmPanel(); updateBmBtn(); }

/* ── Theme ───────────────────────────────────────────────── */
function toggleThemeMushaf() {
  const t = document.documentElement.getAttribute('data-theme')||'light';
  const next = t==='light'?'dark':t==='dark'?'oled':'light';
  document.documentElement.setAttribute('data-theme', next);
  try{ const s=JSON.parse(localStorage.getItem('zad_v2')||'{}'); s.theme=next; localStorage.setItem('zad_v2',JSON.stringify(s)); }catch(e){}
}

/* ── Touch swipe ─────────────────────────────────────────── */
let _tx=0;
const pg = document.getElementById('mushaf-page');
if(pg){
  pg.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
  pg.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_tx;
    if(Math.abs(dx)>60){ dx>0?prevPage():nextPage(); }
  },{passive:true});
}

/* ── Keyboard ────────────────────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.key==='ArrowLeft'||e.key===' '){ e.preventDefault(); nextPage(); }
  if(e.key==='ArrowRight'){ e.preventDefault(); prevPage(); }
  if(e.key==='Escape') closeBmPanel();
});

/* ── INIT ─────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  /* Surah select */
  const ss = document.getElementById('surah-sel');
  SURAHS.forEach(s => {
    const o = document.createElement('option');
    o.value = s.p; o.textContent = `${s.id}. ${s.n}`;
    ss.appendChild(o);
  });

  /* Juz select */
  const js = document.getElementById('juz-sel');
  for(let j=1;j<=30;j++){
    const o = document.createElement('option');
    o.value = j; o.textContent = 'الجزء '+j;
    js.appendChild(o);
  }

  loadPage(_page);
});
</script>
</body>
</html>

<!DOCTYPE html>

<title>المصحف الشريف — زاد العشر</title>
<style>
@font-face{font-family:'ThmanyahSans';src:url('fonts/thmanyahsans-Bold.otf') format('opentype');font-weight:700;font-display:swap}
@font-face{font-family:'ThmanyahSans';src:url('fonts/thmanyahsans-Black.otf') format('opentype');font-weight:900;font-display:swap}

<style>
html,body{font-family:'IBM Plex Sans Arabic','Tajawal',system-ui,sans-serif}
h1,h2,h3,.page-title,.brand-name,.section-title{font-family:'ThmanyahSans','IBM Plex Sans Arabic',sans-serif}

/* ══ Reader Layout ══════════════════════════════════════════ */
.quran-reader{display:flex;flex-direction:column;min-height:100dvh}
.quran-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:var(--green-deep);
  color:#fff;gap:10px;flex-shrink:0;
  position:sticky;top:0;z-index:50
}
.qt-brand{display:flex;align-items:center;gap:8px}
.qt-brand img{width:28px;height:28px;border-radius:6px;flex-shrink:0}
.qt-title{font-size:15px;font-weight:700;font-family:'ThmanyahSans',sans-serif;color:#fff}
.qt-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.qt-back{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:99px;padding:5px 12px;
  color:#fff;text-decoration:none;font-size:12px;font-weight:700;
  transition:background .2s;white-space:nowrap
}
.qt-back:hover{background:rgba(255,255,255,.22)}

/* ══ Surah / Juz Selectors ══════════════════════════════════ */
.quran-nav-bar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;gap:8px;align-items:center;
  flex-wrap:wrap;flex-shrink:0;position:sticky;top:52px;z-index:49
}
.qnb-select{
  flex:1;min-width:130px;max-width:200px;
  padding:8px 12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--sand);
  color:var(--ink);font-family:inherit;font-size:13px;
  outline:none;cursor:pointer;transition:border-color .2s
}
.qnb-select:focus{border-color:var(--gold)}
.qnb-input{
  width:70px;padding:8px 10px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--sand);
  color:var(--ink);font-family:'ThmanyahSans',monospace;
  font-size:14px;font-weight:700;text-align:center;outline:none;
  transition:border-color .2s;direction:ltr
}
.qnb-input:focus{border-color:var(--gold)}
.qnb-of{font-size:12px;color:var(--muted);white-space:nowrap}

/* Bookmark button */
.qnb-bm{
  width:36px;height:36px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--sand);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0
}
.qnb-bm:hover{border-color:var(--gold);background:var(--gold-pale)}
.qnb-bm.marked{border-color:var(--gold);background:var(--gold-pale);color:var(--gold-dark)}

/* ══ Page Image Area ════════════════════════════════════════ */
.quran-page-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:12px 14px;background:var(--sand);position:relative;
  min-height:60vh
}
.quran-page-img{
  max-width:100%;max-height:80vh;object-fit:contain;
  border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.15);
  display:block;transition:opacity .25s;
  /* OLED dark mode: invert to show white text on black */
  filter:none
}
html[data-theme="oled"] .quran-page-img{ filter:invert(1) }
html[data-theme="dark"] .quran-page-img{ filter:invert(1) sepia(0.1) }

/* Loading overlay */
.quran-loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--sand);z-index:5;transition:opacity .3s
}
.quran-loading.hidden{opacity:0;pointer-events:none}
.ql-spinner{font-size:40px;animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Touch/swipe hint */
.swipe-hint{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:#fff;font-size:11px;
  border-radius:99px;padding:4px 14px;pointer-events:none;
  opacity:1;transition:opacity 2s;white-space:nowrap
}
.swipe-hint.gone{opacity:0}

/* ══ Nav Controls ═══════════════════════════════════════════ */
.quran-controls{
  background:var(--card);border-top:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-shrink:0;position:sticky;bottom:0;z-index:50
}
.qc-btn{
  display:flex;align-items:center;gap:6px;
  padding:11px 20px;border-radius:12px;border:none;
  background:var(--green-deep);color:#fff;
  font-family:'ThmanyahSans',inherit;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;flex:1;justify-content:center
}
.qc-btn:hover{background:var(--green-mid);transform:translateY(-2px)}
.qc-btn:active{transform:scale(.97)}
.qc-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
html[data-theme="dark"] .qc-btn,html[data-theme="oled"] .qc-btn{background:var(--sys-green);color:#001a08}

.qc-page-info{text-align:center;min-width:80px}
.qc-page-num{font-size:20px;font-weight:900;font-family:'ThmanyahSans',monospace;color:var(--green-deep)}
html[data-theme="dark"] .qc-page-num,html[data-theme="oled"] .qc-page-num{color:var(--sys-green)}
.qc-page-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.qc-juz{font-size:11px;color:var(--gold-dark);font-weight:700;margin-top:2px}

/* ══ Bookmarks panel ════════════════════════════════════════ */
.bm-panel{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px)
}
.bm-panel.open{display:flex}
.bm-sheet{
  background:var(--card);border-radius:22px 22px 0 0;
  width:100%;max-width:480px;padding:24px 20px 36px;
  max-height:70vh;overflow-y:auto
}
.bm-sheet h3{font-size:17px;font-weight:800;font-family:'ThmanyahSans',sans-serif;margin-bottom:14px}
.bm-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--sand);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s
}
.bm-item:hover{border-color:var(--gold);background:var(--gold-pale)}
.bm-item-info b{display:block;font-size:14px;color:var(--green-deep)}
html[data-theme="dark"] .bm-item-info b,html[data-theme="oled"] .bm-item-info b{color:var(--sys-green)}
.bm-item-info small{font-size:11px;color:var(--muted)}
.bm-del{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px}
.bm-del:hover{color:var(--sys-red)}
.bm-empty{text-align:center;color:var(--muted);padding:20px;font-size:13px}
.bm-close{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:12px;
  background:none;font-family:inherit;font-size:14px;cursor:pointer;color:var(--muted);margin-top:8px}

/* ══ Dark mode image handling ═══════════════════════════════ */
.quran-page-wrap.dark-bg{background:#111}
html[data-theme="oled"] .quran-page-wrap{background:#000}

/* ══ Keyboard shortcut hint ════════════════════════════════ */
.kb-hint{
  display:flex;gap:6px;align-items:center;justify-content:center;
  padding:6px;font-size:11px;color:var(--muted)
}
.kb-key{
  background:var(--sand-2);border:1px solid var(--border);border-radius:5px;
  padding:1px 6px;font-family:monospace;font-size:10px
}
</style>
<script>(function(){var s=localStorage.getItem('zad_v2');var t='light';try{var p=JSON.parse(s);t=p.theme||'light';}catch(e){}document.documentElement.setAttribute('data-theme',t)})();</script>

<body>
<div class="quran-reader" id="quran-reader">

  <!-- ══ Top Bar ══════════════════════════════════════════════ -->
  <div class="quran-topbar">
    <div class="qt-brand">
      <img src="icons/icon-192.svg" alt="زاد العشر">
      <div>
        <div class="qt-title">المصحف الشريف</div>
        <div class="qt-sub" id="qt-surah-name">مصحف المدينة النبوية</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="toggleTheme()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:5px 12px;color:#fff;font-size:14px;cursor:pointer" title="تبديل المظهر">🌙</button>
      <a href="mushaf.html" class="qt-back">← رجوع</a>
    </div>
  </div>

  <!-- ══ Nav Bar: Surah + Juz + Page input ════════════════════ -->
  <div class="quran-nav-bar">
    <!-- Surah selector -->
    <select class="qnb-select" id="surah-select" onchange="goToSurah(this.value)" title="اختر سورة">
      <option value="">📖 اختر سورة...</option>
    </select>

    <!-- Juz selector -->
    <select class="qnb-select" id="juz-select" onchange="goToJuz(this.value)" style="max-width:120px" title="اختر جزءاً">
      <option value="">الجزء</option>
    </select>

    <!-- Page input -->
    <input class="qnb-input" id="page-input" type="number" min="1" max="604"
      placeholder="صفحة" inputmode="numeric"
      onchange="jumpToPage(this.value)" title="انتقل لصفحة">
    <span class="qnb-of">/ 604</span>

    <!-- Bookmark button -->
    <button class="qnb-bm" id="bm-btn" onclick="toggleBookmark()" title="إضافة إشارة مرجعية">🔖</button>
    <button class="qnb-bm" onclick="openBmPanel()" title="الإشارات المرجعية" style="font-size:16px">📚</button>
  </div>

  <!-- ══ Page Image ════════════════════════════════════════════ -->
  <div class="quran-page-wrap" id="page-wrap">
    <!-- Loading spinner -->
    <div class="quran-loading" id="q-loading">
      <div class="ql-spinner">📖</div>
    </div>

    <!-- Page image -->
    <img class="quran-page-img" id="mushaf-page-img"
      src="" alt="صفحة المصحف" loading="eager"
      onload="onImageLoad()" onerror="onImageError()">

    <div class="swipe-hint" id="swipe-hint">← مرّر يميناً/يساراً للتنقل →</div>
  </div>

  <!-- ══ Bottom Controls ══════════════════════════════════════ -->
  <div class="quran-controls">
    <button class="qc-btn" id="btn-next" onclick="nextPage()">
      ← التالية
    </button>
    <div class="qc-page-info">
      <div class="qc-page-num" id="ctrl-page">1</div>
      <div class="qc-page-lbl">صفحة</div>
      <div class="qc-juz" id="ctrl-juz">الجزء 1</div>
    </div>
    <button class="qc-btn" id="btn-prev" onclick="prevPage()">
      السابقة →
    </button>
  </div>

  <!-- Keyboard hint -->
  <div class="kb-hint">
    <span class="kb-key">←</span> <span style="font-size:10px">صفحة تالية</span>
    <span class="kb-key">→</span> <span style="font-size:10px">صفحة سابقة</span>
    <span class="kb-key">Space</span> <span style="font-size:10px">تالية</span>
  </div>

</div><!-- /quran-reader -->

<!-- ══ Bookmarks Panel ══════════════════════════════════════ -->
<div class="bm-panel" id="bm-panel" onclick="closeBmPanel(event)">
  <div class="bm-sheet">
    <h3>📚 الإشارات المرجعية</h3>
    <div id="bm-list"></div>
    <button class="bm-close" onclick="closeBmPanelDirect()">إغلاق</button>
  </div>
</div>

<script src="lang.js" defer></script>
<script src="js/app.js" defer></script>
<script>
/* ════════════════════════════════════════════════════════════
   MUSHAF QURAN READER — Pure JS + GitHub CDN Images
   Source: github.com/marwanhadad/Khatmah-Images (public)
   604 pages — Medina Mushaf
   ════════════════════════════════════════════════════════════ */

/* ── Surah index (start pages in Medina Mushaf) ─────────── */
const SURAHS = [
  {id:1,name:'الفاتحة',page:1},{id:2,name:'البقرة',page:2},
  {id:3,name:'آل عمران',page:50},{id:4,name:'النساء',page:77},
  {id:5,name:'المائدة',page:106},{id:6,name:'الأنعام',page:128},
  {id:7,name:'الأعراف',page:151},{id:8,name:'الأنفال',page:177},
  {id:9,name:'التوبة',page:187},{id:10,name:'يونس',page:208},
  {id:11,name:'هود',page:221},{id:12,name:'يوسف',page:235},
  {id:13,name:'الرعد',page:249},{id:14,name:'إبراهيم',page:255},
  {id:15,name:'الحجر',page:262},{id:16,name:'النحل',page:267},
  {id:17,name:'الإسراء',page:282},{id:18,name:'الكهف',page:293},
  {id:19,name:'مريم',page:305},{id:20,name:'طه',page:312},
  {id:21,name:'الأنبياء',page:322},{id:22,name:'الحج',page:332},
  {id:23,name:'المؤمنون',page:342},{id:24,name:'النور',page:350},
  {id:25,name:'الفرقان',page:359},{id:26,name:'الشعراء',page:367},
  {id:27,name:'النمل',page:377},{id:28,name:'القصص',page:385},
  {id:29,name:'العنكبوت',page:396},{id:30,name:'الروم',page:404},
  {id:31,name:'لقمان',page:411},{id:32,name:'السجدة',page:415},
  {id:33,name:'الأحزاب',page:418},{id:34,name:'سبأ',page:428},
  {id:35,name:'فاطر',page:434},{id:36,name:'يس',page:440},
  {id:37,name:'الصافات',page:446},{id:38,name:'ص',page:453},
  {id:39,name:'الزمر',page:458},{id:40,name:'غافر',page:467},
  {id:41,name:'فصلت',page:477},{id:42,name:'الشورى',page:483},
  {id:43,name:'الزخرف',page:489},{id:44,name:'الدخان',page:496},
  {id:45,name:'الجاثية',page:499},{id:46,name:'الأحقاف',page:502},
  {id:47,name:'محمد',page:507},{id:48,name:'الفتح',page:511},
  {id:49,name:'الحجرات',page:515},{id:50,name:'ق',page:518},
  {id:51,name:'الذاريات',page:520},{id:52,name:'الطور',page:523},
  {id:53,name:'النجم',page:526},{id:54,name:'القمر',page:528},
  {id:55,name:'الرحمن',page:531},{id:56,name:'الواقعة',page:534},
  {id:57,name:'الحديد',page:537},{id:58,name:'المجادلة',page:542},
  {id:59,name:'الحشر',page:545},{id:60,name:'الممتحنة',page:549},
  {id:61,name:'الصف',page:551},{id:62,name:'الجمعة',page:553},

  {id:71,name:'نوح',page:570},{id:72,name:'الجن',page:571},
  {id:73,name:'المزمل',page:573},{id:74,name:'المدثر',page:575},
  {id:75,name:'القيامة',page:577},{id:76,name:'الإنسان',page:578},
  {id:77,name:'المرسلات',page:580},{id:78,name:'النبأ',page:582},
  {id:79,name:'النازعات',page:583},{id:80,name:'عبس',page:585},
  {id:81,name:'التكوير',page:586},{id:82,name:'الانفطار',page:587},
  {id:83,name:'المطففين',page:588},{id:84,name:'الانشقاق',page:589},
  {id:85,name:'البروج',page:590},{id:86,name:'الطارق',page:591},
  {id:87,name:'الأعلى',page:591},{id:88,name:'الغاشية',page:592},
  {id:89,name:'الفجر',page:593},{id:90,name:'البلد',page:594},
  {id:91,name:'الشمس',page:595},{id:92,name:'الليل',page:595},
  {id:93,name:'الضحى',page:596},{id:94,name:'الشرح',page:596},
  {id:95,name:'التين',page:597},{id:96,name:'العلق',page:597},

  {id:101,name:'القارعة',page:600},{id:102,name:'التكاثر',page:600},
  {id:103,name:'العصر',page:601},{id:104,name:'الهمزة',page:601},
  {id:105,name:'الفيل',page:601},{id:106,name:'قريش',page:602},
  {id:107,name:'الماعون',page:602},{id:108,name:'الكوثر',page:602},
  {id:109,name:'الكافرون',page:603},{id:110,name:'النصر',page:603},
  {id:111,name:'المسد',page:603},{id:112,name:'الإخلاص',page:604},
  {id:113,name:'الفلق',page:604},{id:114,name:'الناس',page:604}
];

/* Juz start pages (approximate, Medina Mushaf) */
const JUZ_PAGES = [
  1,22,42,62,82,102,121,142,162,182,
  201,222,241,262,282,302,322,342,362,382,
  402,422,442,462,482,502,522,542,562,582
];

/* ── State ──────────────────────────────────────────────── */
const STORAGE_KEY = 'zad_mushaf_page';
const BM_KEY      = 'zad_mushaf_bookmarks';
let _page = parseInt(localStorage.getItem(STORAGE_KEY) || '1');
let _bookmarks = JSON.parse(localStorage.getItem(BM_KEY) || '[]');

/* ── Image CDN — GitHub public repo (zero load on your server) ── */
/* CDN priority:
   1. jsDelivr (GitHub CDN, no CORS, global)
   2. QuranHub repo (backup images)
   3. searchtruth.com (last resort)
*/
const CDN_SOURCES = [
  p => `https://cdn.jsdelivr.net/gh/Tariq-1/Al-Quran-Al-Kareem-Page-Images@master/jpg/${String(p).padStart(3,'0')}.jpg`,
  p => `https://cdn.jsdelivr.net/gh/QuranHub/quran-pages-images@main/hafs/${String(p).padStart(3,'0')}.png`,
  p => `https://www.searchtruth.com/quran/images/page-${String(p).padStart(3,'0')}.gif`,
];
let _cdnIdx = 0; /* track which CDN we're using */

function imgUrl(page) {
  return CDN_SOURCES[_cdnIdx](page);
}

function imgUrlFallback(page) {
  _cdnIdx = Math.min(_cdnIdx + 1, CDN_SOURCES.length - 1);
  return CDN_SOURCES[_cdnIdx](page);
}

/* ── Render page ─────────────────────────────────────────── */
function renderPage(p, saveState = true) {
  p = Math.max(1, Math.min(604, p));
  _page = p;

  /* Reset CDN index and error state for each new page */
  _cdnIdx = 0;
  const errEl = document.querySelector('.cdn-error');
  if (errEl) errEl.remove();

  /* Show loading */
  const loading = document.getElementById('q-loading');
  if (loading) loading.classList.remove('hidden');

  /* Set image */
  const img = document.getElementById('mushaf-page-img');
  if (img) {
    img.style.display = '';
    img.dataset.attempts = '0';
    img.src = '';
    setTimeout(() => { img.src = imgUrl(p); }, 30);
  }

  /* Update controls */
  const pageInput = document.getElementById('page-input');
  if (pageInput) pageInput.value = p;

  const ctrlPage = document.getElementById('ctrl-page');
  if (ctrlPage) ctrlPage.textContent = p;

  const juz = getJuz(p);
  const ctrlJuz = document.getElementById('ctrl-juz');
  if (ctrlJuz) ctrlJuz.textContent = 'الجزء ' + juz;

  /* Update surah name in topbar */
  const surahName = getSurahName(p);
  const qtSub = document.getElementById('qt-surah-name');
  if (qtSub) qtSub.textContent = surahName;

  /* Update surah select to current surah */
  const surahSel = document.getElementById('surah-select');
  if (surahSel) {
    const match = [...SURAHS].reverse().find(s => s.page <= p);
    if (match) surahSel.value = match.page;
  }

  /* Update juz select */
  const juzSel = document.getElementById('juz-select');
  if (juzSel) juzSel.value = juz;

  /* Disable/enable buttons */
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  if (btnPrev) btnPrev.disabled = p <= 1;
  if (btnNext) btnNext.disabled = p >= 604;

  /* Bookmark indicator */
  updateBmButton();

  /* Save to localStorage */
  if (saveState) localStorage.setItem(STORAGE_KEY, p);

  /* Preload next page */
  if (p < 604) {
    const pre = new Image();
    pre.src = imgUrl(p + 1);
  }
}

/* ── Image load/error callbacks ─────────────────────────── */
function onImageLoad() {
  const loading = document.getElementById('q-loading');
  if (loading) loading.classList.add('hidden');
}

function onImageError() {
  const img = document.getElementById('mushaf-page-img');
  if (!img) return;
  const attempts = parseInt(img.dataset.attempts || '0');
  if (attempts < CDN_SOURCES.length - 1) {
    img.dataset.attempts = attempts + 1;
    img.src = imgUrlFallback(_page);
  } else {
    /* All CDNs failed */
    const loading = document.getElementById('q-loading');
    if (loading) loading.classList.add('hidden');
    img.style.display = 'none';
    const wrap = document.getElementById('page-wrap');
    if (wrap && !wrap.querySelector('.cdn-error')) {
      wrap.insertAdjacentHTML('beforeend', `
        <div class="cdn-error" style="text-align:center;padding:40px 20px">
          <div style="font-size:48px;margin-bottom:12px">📡</div>
          <div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:8px">تعذّر تحميل صفحة المصحف</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7">تحقق من اتصالك بالإنترنت وأعد المحاولة</div>
          <button onclick="reloadPage()" style="padding:10px 24px;border-radius:99px;border:none;background:var(--green-deep);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">🔄 إعادة المحاولة</button>
        </div>`);
    }
  }
}

function reloadPage() {
  _cdnIdx = 0;
  const img = document.getElementById('mushaf-page-img');
  if (img) {
    img.style.display = '';
    img.dataset.attempts = '0';
  }
  const errEl = document.querySelector('.cdn-error');
  if (errEl) errEl.remove();
  renderPage(_page, false);
}

/* ── Navigation ─────────────────────────────────────────── */
function nextPage() { if (_page < 604) renderPage(_page + 1); }
function prevPage() { if (_page > 1)   renderPage(_page - 1); }
function jumpToPage(v) { const n = parseInt(v); if (n >= 1 && n <= 604) renderPage(n); }
function goToSurah(page) { if (page) renderPage(parseInt(page)); }
function goToJuz(juz) {
  if (!juz) return;
  const idx = parseInt(juz) - 1;
  if (JUZ_PAGES[idx]) renderPage(JUZ_PAGES[idx]);
}

/* ── Helpers ─────────────────────────────────────────────── */
function getJuz(page) {
  for (let i = JUZ_PAGES.length - 1; i >= 0; i--) {
    if (page >= JUZ_PAGES[i]) return i + 1;
  }
  return 1;
}

function getSurahName(page) {
  const match = [...SURAHS].reverse().find(s => s.page <= page);
  return match ? 'سورة ' + match.name : 'مصحف المدينة النبوية';
}

/* ── Bookmarks ───────────────────────────────────────────── */
function toggleBookmark() {
  const idx = _bookmarks.findIndex(b => b.page === _page);
  if (idx > -1) {
    _bookmarks.splice(idx, 1);
  } else {
    _bookmarks.push({
      page:  _page,
      surah: getSurahName(_page),
      juz:   getJuz(_page),
      date:  new Date().toLocaleDateString('ar-EG')
    });
  }
  localStorage.setItem(BM_KEY, JSON.stringify(_bookmarks));
  updateBmButton();
}

function updateBmButton() {
  const btn = document.getElementById('bm-btn');
  if (!btn) return;
  const marked = _bookmarks.some(b => b.page === _page);
  btn.classList.toggle('marked', marked);
  btn.title = marked ? 'إزالة الإشارة' : 'إضافة إشارة مرجعية';
}

function openBmPanel() {
  const panel = document.getElementById('bm-panel');
  if (panel) panel.classList.add('open');
  renderBmList();
}

function closeBmPanel(e) {
  if (e.target === document.getElementById('bm-panel')) closeBmPanelDirect();
}

function closeBmPanelDirect() {
  const panel = document.getElementById('bm-panel');
  if (panel) panel.classList.remove('open');
}

function renderBmList() {
  const list = document.getElementById('bm-list');
  if (!list) return;
  if (!_bookmarks.length) {
    list.innerHTML = '<div class="bm-empty">لا توجد إشارات بعد — اضغط 🔖 لحفظ صفحتك</div>';
    return;
  }
  list.innerHTML = _bookmarks.slice().reverse().map(b => `
    <div class="bm-item" onclick="renderPage(${b.page});closeBmPanelDirect()">
      <div class="bm-item-info">
        <b>صفحة ${b.page}</b>
        <small>${b.surah} · الجزء ${b.juz} · ${b.date}</small>
      </div>
      <button class="bm-del" onclick="event.stopPropagation();deleteBm(${b.page})" title="حذف">🗑️</button>
    </div>`).join('');
}

function deleteBm(page) {
  _bookmarks = _bookmarks.filter(b => b.page !== page);
  localStorage.setItem(BM_KEY, JSON.stringify(_bookmarks));
  updateBmButton();
  renderBmList();
}

/* ── Touch swipe ─────────────────────────────────────────── */
let _touchX = 0;
const wrap = document.getElementById('page-wrap');
if (wrap) {
  wrap.addEventListener('touchstart', e => { _touchX = e.touches[0].clientX; }, { passive:true });
  wrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _touchX;
    if (Math.abs(dx) > 50) {
      dx > 0 ? prevPage() : nextPage(); /* RTL: swipe right = prev */
    }
  }, { passive:true });
}

/* ── Keyboard navigation ─────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft'  || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowRight')                  { e.preventDefault(); prevPage(); }
  if (e.key === 'Escape') closeBmPanelDirect();
});

/* ── Theme toggle ─────────────────────────────────────────── */
function toggleTheme() {
  const cur  = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : cur === 'light' ? 'oled' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  try {
    const s = JSON.parse(localStorage.getItem('zad_v2') || '{}');
    s.theme = next; localStorage.setItem('zad_v2', JSON.stringify(s));
  } catch(e) {}
  /* Update wrap bg for dark */
  const wrap = document.getElementById('page-wrap');
  if (wrap) wrap.classList.toggle('dark-bg', next !== 'light');
}

/* ── INIT ─────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {

  /* Fill surah select */
  const surahSel = document.getElementById('surah-select');
  if (surahSel) {
    SURAHS.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.page;
      opt.textContent = `${s.id}. سورة ${s.name}`;
      surahSel.appendChild(opt);
    });
  }

  /* Fill juz select */
  const juzSel = document.getElementById('juz-select');
  if (juzSel) {
    for (let j = 1; j <= 30; j++) {
      const opt = document.createElement('option');
      opt.value = j;
      opt.textContent = 'الجزء ' + j;
      juzSel.appendChild(opt);
    }
  }

  /* Apply dark bg if needed */
  const theme = document.documentElement.getAttribute('data-theme');
  const wrap  = document.getElementById('page-wrap');
  if (wrap && theme !== 'light') wrap.classList.add('dark-bg');

  /* Render last saved page */
  renderPage(_page);

  /* Hide swipe hint after 4 seconds */
  setTimeout(() => {
    const hint = document.getElementById('swipe-hint');
    if (hint) hint.classList.add('gone');
  }, 4000);
});
</script>
</body>
</html>
